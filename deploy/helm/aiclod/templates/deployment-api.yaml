apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "aiclod.fullname" . }}-api
  labels:
    {{- include "aiclod.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
      {{- include "aiclod.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        {{- include "aiclod.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: api
    spec:
      serviceAccountName: {{ include "aiclod.serviceAccountName" . }}
      containers:
        - name: api
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.api.service.port }}
              name: http
          envFrom:
            - configMapRef:
                name: {{ include "aiclod.fullname" . }}-config
            - secretRef:
                name: {{ include "aiclod.fullname" . }}-secrets
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
