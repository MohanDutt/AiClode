apiVersion: v1
kind: Secret
metadata:
  name: {{ include "aiclod.fullname" . }}-secrets
  labels:
    {{- include "aiclod.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: {{ .Values.api.secrets.DATABASE_URL | quote }}
  REDIS_URL: {{ .Values.api.secrets.REDIS_URL | quote }}
  RABBITMQ_URL: {{ .Values.api.secrets.RABBITMQ_URL | quote }}
  OPENSEARCH_URL: {{ .Values.api.secrets.OPENSEARCH_URL | quote }}
  KEYCLOAK_BASE_URL: {{ .Values.api.secrets.KEYCLOAK_BASE_URL | quote }}
  S3_ENDPOINT: {{ .Values.api.secrets.S3_ENDPOINT | quote }}
  S3_BUCKET: {{ .Values.api.secrets.S3_BUCKET | quote }}
  S3_REGION: {{ .Values.api.secrets.S3_REGION | quote }}
  JWT_ISSUER: {{ .Values.api.secrets.JWT_ISSUER | quote }}
  JWT_AUDIENCE: {{ .Values.api.secrets.JWT_AUDIENCE | quote }}
  JWT_JWKS_URI: {{ .Values.api.secrets.JWT_JWKS_URI | quote }}
