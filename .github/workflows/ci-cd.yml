name: ci-cd

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install yaml validator
        run: python -m pip install --upgrade pip pyyaml

      - name: Validate YAML and JSON scaffold files
        run: |
          python - <<'PY'
          from pathlib import Path
          import json
          import yaml

          yaml_files = [
              *Path('.github/workflows').glob('*.yml'),
              Path('docker-compose.yml'),
              *Path('deploy/monitoring').rglob('*.yaml'),
              *Path('deploy/monitoring').rglob('*.yml'),
              *Path('config/communications').glob('*.yaml'),
              *Path('config/admin').glob('*.yaml'),
              *Path('config/ai').glob('*.yaml'),
              *Path('config/ai/prompts').glob('*.yaml'),
              *Path('config/i18n/email-templates').glob('*.liquid'),
          ]
          json_files = [
              *Path('config/i18n').glob('*.json'),
              *Path('config/ai').glob('*.json'),
              *Path('config/admin').glob('*.json'),
          ]
          for path in yaml_files:
              with path.open() as fh:
                  list(yaml.safe_load_all(fh))
          for path in json_files:
              with path.open() as fh:
                  json.load(fh)
          print(f"validated {len(yaml_files)} YAML-like files and {len(json_files)} JSON files")
          PY

      - name: Validate env templates exist
        run: |
          test -f config/environments/local.env.example
          test -f config/environments/staging.env.example
          test -f config/environments/production.env.example

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Lint Helm chart
        run: helm lint ./deploy/helm/aiclod

      - name: Check Terraform formatting
        run: terraform fmt -check -recursive infra/terraform

      - name: Run local validation script
        run: ./scripts/test-local.sh

  build-and-release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && hashFiles('apps/web/Dockerfile') != '' && hashFiles('apps/api/Dockerfile') != '' && hashFiles('apps/worker/Dockerfile') != ''
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read
      packages: write
      id-token: write
    strategy:
      matrix:
        component: [web, api, worker]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push container
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/${{ matrix.component }}/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/aiclod-${{ matrix.component }}:${{ github.sha }}

      - name: Deploy with Helm
        env:
          KUBECONFIG_DATA: ${{ secrets.KUBECONFIG_DATA }}
        run: |
          echo "$KUBECONFIG_DATA" | base64 -d > kubeconfig
          export KUBECONFIG=$PWD/kubeconfig
          helm upgrade --install aiclod ./deploy/helm/aiclod \
            --namespace aiclod \
            --create-namespace \
            --set web.image.repository=ghcr.io/${{ github.repository_owner }}/aiclod-web \
            --set web.image.tag=${{ github.sha }} \
            --set api.image.repository=ghcr.io/${{ github.repository_owner }}/aiclod-api \
            --set api.image.tag=${{ github.sha }} \
            --set worker.image.repository=ghcr.io/${{ github.repository_owner }}/aiclod-worker \
            --set worker.image.tag=${{ github.sha }}
